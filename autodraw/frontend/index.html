<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaperDraw Backend Tester</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>PaperDraw Backend Tester</h1>
        <p class="hint">最小测试页：提交任务、轮询状态、下载 zip。</p>

        <form id="jobForm" class="form">
          <label>
            <span>Backend URL</span>
            <input id="backendUrl" name="backendUrl" value="http://127.0.0.1:8001" />
          </label>

          <label>
            <span>Method Text</span>
            <textarea
              id="methodText"
              name="methodText"
              rows="10"
              placeholder="输入 method text"
              required
            ></textarea>
          </label>

          <div class="grid">
            <label>
              <span>Provider</span>
              <select id="provider" name="provider">
                <option value="bianxie">bianxie</option>
                <option value="openrouter">openrouter</option>
                <option value="qingyun" selected>qingyun</option>
                <option value="gemini">gemini</option>
              </select>
            </label>

            <label>
              <span>SAM Backend</span>
              <select id="samBackend" name="samBackend">
                <option value="local">local</option>
                <option value="roboflow">roboflow</option>
                <option value="fal" selected>fal</option>
                <option value="api">api</option>
              </select>
            </label>

            <label>
              <span>Optimize Iterations</span>
              <input id="optimizeIterations" name="optimizeIterations" type="number" min="0" value="0" />
            </label>

            <label>
              <span>Image Size</span>
              <select id="imageSize" name="imageSize">
                <option value="1K">1K</option>
                <option value="2K">2K</option>
                <option value="4K" selected>4K</option>
              </select>
            </label>
          </div>

          <label>
            <span>SAM API URL</span>
            <input
              id="samApiUrl"
              name="samApiUrl"
              placeholder="例如: http://your-server:9001/fal-ai/sam-3/image"
            />
          </label>

          <label>
            <span>API Key</span>
            <input id="apiKey" name="apiKey" type="password" placeholder="可留空，走后端环境变量" />
          </label>

          <label>
            <span>SAM API Key</span>
            <input id="samApiKey" name="samApiKey" type="password" placeholder="可选" />
          </label>

          <div class="actions">
            <button id="submitBtn" type="submit">提交任务</button>
            <button id="downloadBtn" type="button" disabled>下载 Zip</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>状态</h2>
        <div class="status">
          <div><strong>Job ID:</strong> <span id="jobId">-</span></div>
          <div><strong>Status:</strong> <span id="jobStatus">idle</span></div>
          <div><strong>Error:</strong> <span id="jobError">-</span></div>
        </div>

        <h2>产物</h2>
        <ul id="artifactList" class="artifactList"></ul>

        <h2>响应</h2>
        <pre id="responseBox" class="responseBox">{}</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
